services:

  # ─────────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────────

  mongo:
    image: mongo:7.0
    container_name: clean-pro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - clean-pro-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: clean-pro-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - clean-pro-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  service-registry:
    build:
      context: ./clean-pro-solutions-service-registry
      dockerfile: Dockerfile
    container_name: clean-pro-service-registry
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - clean-pro-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./clean-pro-solutions-auth-service
      dockerfile: Dockerfile
    container_name: clean-pro-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      MONGO_URI: mongodb://mongo:27017/auth_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_SERVER_URL: http://service-registry:8761/eureka
      JWT_SECRET: cleanProSolutionsSuperSecretKeyForJWT2026MustBe256BitsOrMore
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - clean-pro-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  user-service:
